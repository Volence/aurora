<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:" />
  <title>Aurora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: var(--font-ui, "Inter", system-ui, -apple-system, 'Segoe UI', sans-serif); background: var(--void, #0A0C12); color: var(--text-base, #B8BECE); font-size: var(--text-base-size, 13px); }

    /* Button hover/active feedback */
    button:not(:disabled):hover { filter: brightness(1.3); }
    button:not(:disabled):active { filter: brightness(0.9); transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed !important; }
    button { transition: filter 0.1s, transform 0.08s; }

    /* Select hover */
    select:hover { filter: brightness(1.2); }
    select { transition: filter 0.1s; }

    /* Checkbox label hover */
    label:hover { color: #E8EAF2 !important; }

    /* Toast animations */
    @keyframes toast-in {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes toast-out {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-10px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
